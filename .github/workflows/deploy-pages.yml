name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build engine & AI
        run: pnpm --filter @chessforge/engine build && pnpm --filter @chessforge/ai build

      - name: Build client
        env:
          # Project Pages: https://<user>.github.io/<repo>/
          VITE_BASE: /${{ github.event.repository.name }}/
        run: pnpm --filter @chessforge/client build

      - name: SPA fallback for GitHub Pages
        run: cp packages/client/dist/index.html packages/client/dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
